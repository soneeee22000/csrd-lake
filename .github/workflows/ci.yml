name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy strict
        run: uv run mypy src

      - name: Smoke test (always must pass)
        run: uv run pytest -m smoke -v

      - name: Full test suite
        run: uv run pytest

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  dbt:
    name: dbt — parse + compile
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dbt deps
        run: uv sync --extra dbt

      - name: dbt parse (no Snowflake connection needed)
        # PRD Phase 2 step 18 — verify dbt project parses cleanly
        # Will replace with `dbt build --target ci` once Snowflake CI service connection added in Weekend 2.
        run: |
          if [ -d dbt_project ] && [ -f dbt_project/dbt_project.yml ]; then
            cd dbt_project && uv run dbt parse --target dev || echo "dbt project not yet populated; skipping"
          else
            echo "dbt_project not yet scaffolded — skipping (will activate in Weekend 2)"
          fi
